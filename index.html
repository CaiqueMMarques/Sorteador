<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sorteador</title>
</head>

<body>
    <img src="./assets/bf9005e4ea371946d39627b79e08544906437e6f.png" alt="imagem de um dado">
    <h1 class="draw-lots">Sorteador</h1>
    <h4>Sortear um número</h4> 
    <div class="input-numbers">
        <input class="input-min" type="number" placeholder="Entre">
        <input class="input-max" type="number" placeholder="e">
    </div>
    <button class="button-raffle">Sortear</button>
    <div class="div-result">
        <h1 class="result">Resultado</h1>
        <h2 class="number-result"></h2>
    </div>
</body>
<script src="./script.js"></script>
</html>
